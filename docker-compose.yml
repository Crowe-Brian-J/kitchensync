version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kitchensync-db
    environment:
      POSTGRES_DB: kitchensync
      POSTGRES_USER: kitchensync_user
      POSTGRES_PASSWORD: kitchensync_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitchensync_user -d kitchensync"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kitchensync-backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: kitchensync
      DB_USER: kitchensync_user
      DB_PASSWORD: kitchensync_pass
      PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: kitchensync-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5555
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  postgres_data:
